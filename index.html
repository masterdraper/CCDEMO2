<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calyx Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@10..48,300;10..48,400;10..48,500;10..48,600;10..48,700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #e8eaee;
    --bg-deeper:    #d8dce2;
    --pattern:      rgba(40, 50, 65, 0.10);
    --ink:          #0a0a0a;
    --ink-soft:     rgba(10, 10, 10, 0.55);
    --ink-faint:    rgba(10, 10, 10, 0.32);
    --teal:         #0d4f5e;
    --teal-soft:    rgba(13, 79, 94, 0.55);
    --teal-tint:    rgba(13, 79, 94, 0.10);
    --frost:        rgba(255, 255, 255, 0.42);
    --frost-strong: rgba(255, 255, 255, 0.62);
    --frost-deep:   rgba(245, 247, 250, 0.30);
    --hairline:     rgba(10, 10, 10, 0.85);
    --hairline-soft: rgba(10, 10, 10, 0.18);
    --display: 'Bricolage Grotesque', ui-sans-serif, system-ui, sans-serif;
    --body:    'Archivo Narrow', ui-sans-serif, system-ui, sans-serif;
  }

  html, body, #root {
    color: var(--ink);
    font-family: var(--body);
    font-size: 14.5px;
    line-height: 1.45;
    letter-spacing: 0.01em;
    -webkit-font-smoothing: antialiased;
    width: 100%;
    max-width: 100vw;
    overflow-x: hidden;
  }
  html { background: var(--bg); }
  body, #root { background: transparent; }

  body { position: relative; min-height: 100vh; }

  /* ---------- Background layers ---------- */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    background:
      radial-gradient(120% 80% at 50% 0%, rgba(255,255,255,0.40) 0%, rgba(255,255,255,0) 55%),
      radial-gradient(80% 60% at 100% 100%, rgba(13,79,94,0.07) 0%, rgba(13,79,94,0) 60%),
      var(--bg);
  }
  #brain-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: brainPulse 38s ease-in-out infinite;
  }
  #brain-overlay svg {
    width: min(78vh, 78vw);
    height: min(78vh, 78vw);
    color: rgba(10, 10, 10, 0.42);
    transform-origin: center;
    animation: brainDrift 24s ease-in-out infinite alternate;
  }
  @keyframes brainPulse {
    0%, 60% { opacity: 0; }
    72%     { opacity: 0.18; }
    82%     { opacity: 0.20; }
    92%     { opacity: 0; }
    100%    { opacity: 0; }
  }
  @keyframes brainDrift {
    from { transform: scale(0.96) rotate(-1.5deg); }
    to   { transform: scale(1.04) rotate(1.5deg); }
  }

  /* ---------- Typography ---------- */
  h1, h2, h3, .display { font-family: var(--display); font-weight: 500; letter-spacing: -0.01em; }
  button, a { font-family: inherit; cursor: pointer; }
  button { border: none; background: none; }
  a { color: inherit; text-decoration: none; }

  /* ---------- Frost primitive ---------- */
  .frost {
    background: var(--frost);
    backdrop-filter: blur(14px) saturate(125%);
    -webkit-backdrop-filter: blur(14px) saturate(125%);
    border: 1px solid var(--hairline);
  }
  .frost-soft {
    background: var(--frost-deep);
    backdrop-filter: blur(8px) saturate(115%);
    -webkit-backdrop-filter: blur(8px) saturate(115%);
    border: 1px solid var(--hairline-soft);
  }

  /* ---------- Top bar ---------- */
  .topbar {
    position: relative;
    z-index: 3;
    padding: 9px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
    background: var(--frost-deep);
    backdrop-filter: blur(10px) saturate(120%);
    -webkit-backdrop-filter: blur(10px) saturate(120%);
    border-bottom: 1px solid var(--hairline);
    font-size: 12.5px;
    letter-spacing: 0.02em;
  }
  .topbar-left, .topbar-right {
    display: flex; align-items: center; gap: 14px; min-width: 0; flex-wrap: wrap;
  }
  .pill-mode {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 4px 12px;
    border: 1px solid var(--teal);
    color: var(--teal);
    border-radius: 999px;
    font-weight: 600;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .topbar-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--ink); white-space: nowrap;
  }
  .topbar-link:hover { color: var(--teal); }
  .topbar-right .topbar-link { color: var(--teal); }
  .topbar-search {
    display: inline-flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 5px 12px;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    background: var(--frost);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    width: 230px; height: 30px;
    color: var(--ink-soft);
    cursor: pointer;
    font-size: 12.5px;
    transition: border-color .15s;
  }
  .topbar-search:hover { border-color: var(--teal); color: var(--teal); }
  .topbar-search > span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .viewing-label {
    font-weight: 500; color: var(--ink-soft);
    text-transform: uppercase; letter-spacing: 0.14em; font-size: 10.5px;
  }

  /* ---------- Nav ---------- */
  .nav {
    position: relative;
    z-index: 3;
    padding: 12px 22px;
    display: flex; align-items: center; gap: 8px;
    background: var(--frost-deep);
    backdrop-filter: blur(10px) saturate(120%);
    -webkit-backdrop-filter: blur(10px) saturate(120%);
    border-bottom: 1px solid var(--hairline);
  }
  .nav-logo {
    display: inline-flex; align-items: center; justify-content: center;
    margin-right: 10px; flex-shrink: 0; line-height: 1;
    color: var(--ink);
  }
  .nav-logo svg { display: block; }
  .nav-items {
    display: flex; align-items: center; gap: 4px;
    flex: 1 1 auto; min-width: 0; overflow: hidden;
  }
  .nav-item {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 11px;
    border-radius: 999px;
    border: 1px solid transparent;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink);
    white-space: nowrap;
    flex-shrink: 0; min-width: 0;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    transition: border-color .12s, background .12s, color .12s;
  }
  .nav-item:hover { border-color: var(--hairline-soft); background: rgba(255,255,255,0.35); }
  .nav-item.active {
    background: var(--frost-strong);
    border-color: var(--ink);
    color: var(--ink);
    box-shadow: inset 0 0 0 0.5px var(--ink);
  }
  .nav-item.active svg { color: var(--teal); }
  .nav-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .nav-copilot {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border: 1px solid var(--teal);
    color: var(--teal);
    border-radius: 999px;
    font-size: 12.5px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.01em;
    background: var(--frost);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .nav-copilot:hover { background: var(--teal-tint); }
  .nav-bell {
    width: 34px; height: 34px;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--frost);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: var(--ink);
    flex-shrink: 0;
  }
  .nav-bell:hover { border-color: var(--teal); color: var(--teal); }

  /* ---------- Main layout ---------- */
  .main {
    position: relative; z-index: 3;
    padding: 22px 22px 32px;
    max-width: 1420px; margin: 0 auto; width: 100%;
  }

  .welcome-row {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 18px; gap: 18px; flex-wrap: wrap;
  }
  .welcome-row h1 {
    font-size: 38px;
    font-weight: 500;
    letter-spacing: -0.025em;
    line-height: 1;
  }
  .welcome-row h1 .accent {
    font-style: italic;
    font-weight: 400;
    color: var(--teal);
    margin-left: 4px;
  }
  .welcome-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  /* ---------- Buttons ---------- */
  .btn {
    padding: 9px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    display: inline-flex; align-items: center; gap: 8px;
    white-space: nowrap;
    border: 1px solid var(--ink);
    color: var(--ink);
    background: var(--frost);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: background .14s, color .14s, border-color .14s;
  }
  .btn:hover { background: var(--frost-strong); }
  .btn-teal { border-color: var(--teal); color: var(--teal); }
  .btn-teal:hover { background: var(--teal-tint); }
  .btn-ghost { border-color: var(--hairline-soft); color: var(--ink); }
  .btn-ghost:hover { border-color: var(--ink); }
  .btn-sm { padding: 5px 12px; font-size: 11.5px; letter-spacing: 0.06em; text-transform: uppercase; }

  /* ---------- Stats ---------- */
  .stats {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 18px;
  }
  .stat {
    padding: 16px 18px;
    border-radius: 14px;
    background: var(--frost);
    backdrop-filter: blur(12px) saturate(125%);
    -webkit-backdrop-filter: blur(12px) saturate(125%);
    border: 1px solid var(--hairline);
    position: relative;
  }
  .stat::after {
    content: "";
    position: absolute; inset: 3px;
    border: 1px solid rgba(10,10,10,0.06);
    border-radius: 11px;
    pointer-events: none;
  }
  .stat-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; gap: 6px;
  }
  .stat-label {
    font-family: var(--body);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
  }
  .stat-icon { color: var(--teal); display: inline-flex; }
  .stat-value {
    font-family: var(--display);
    font-size: 32px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .stat-value.dim { color: var(--ink-faint); font-weight: 400; }
  .stat-sub {
    font-size: 12px;
    color: var(--ink-soft);
    text-transform: lowercase;
    letter-spacing: 0.04em;
  }

  /* ---------- Two columns ---------- */
  .columns {
    display: flex; gap: 14px; align-items: flex-start;
    margin-bottom: 14px;
  }
  .col-left  { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; gap: 14px; }
  .col-right { flex: 0 1 380px; min-width: 0; max-width: 380px; display: flex; flex-direction: column; gap: 14px; }

  /* ---------- Card ---------- */
  .card {
    padding: 18px 20px;
    border-radius: 16px;
    background: var(--frost);
    backdrop-filter: blur(14px) saturate(125%);
    -webkit-backdrop-filter: blur(14px) saturate(125%);
    border: 1px solid var(--hairline);
    position: relative;
  }
  .card::after {
    content: "";
    position: absolute; inset: 4px;
    border: 1px solid rgba(10,10,10,0.05);
    border-radius: 13px;
    pointer-events: none;
  }
  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; gap: 8px; flex-wrap: wrap;
  }
  .card-title {
    display: inline-flex; align-items: center; gap: 9px;
    font-family: var(--display);
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .card-title .ic { display: inline-flex; color: var(--teal); }
  .card-sub {
    font-size: 11px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.16em;
  }

  /* ---------- Tabs ---------- */
  .tabs { display: inline-flex; gap: 0; border: 1px solid var(--hairline-soft); border-radius: 999px; padding: 2px; background: var(--frost); }
  .tab {
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: color .12s, border-color .12s, background .12s;
    border: 1px solid transparent;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--teal);
    border-color: var(--teal);
    background: var(--frost-strong);
  }

  /* ---------- Empty states ---------- */
  .empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px 12px 20px; text-align: center;
  }
  .empty-icon {
    width: 56px; height: 56px;
    border-radius: 999px;
    border: 1px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
    color: var(--teal);
    background: var(--frost-strong);
  }
  .empty-icon.muted { color: var(--ink-soft); border-color: var(--hairline-soft); }
  .empty-title {
    font-family: var(--display);
    font-size: 17px; font-weight: 500;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .empty-sub {
    font-size: 12.5px; color: var(--ink-soft);
    margin-bottom: 14px; max-width: 340px; line-height: 1.5;
  }
  .empty-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

  /* ---------- Calendar ---------- */
  .cal-head {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 6px 0 10px;
  }
  .cal-month {
    font-family: var(--display);
    font-size: 14px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.18em;
  }
  .cal-nav {
    width: 26px; height: 26px;
    border: 1px solid var(--hairline-soft);
    border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink); cursor: pointer;
  }
  .cal-nav:hover { border-color: var(--teal); color: var(--teal); }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
    row-gap: 3px;
  }
  .cal-dow {
    text-align: center;
    font-size: 9.5px; font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding: 4px 0 6px;
  }
  .cal-day {
    aspect-ratio: 1 / 1;
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 7px;
    font-size: 12.5px;
    color: var(--ink);
    cursor: pointer;
    border-radius: 6px;
    border: 1px solid transparent;
    transition: border-color .12s, color .12s, background .12s;
  }
  .cal-day.muted { color: var(--ink-faint); cursor: default; }
  .cal-day:hover:not(.muted):not(.selected) { border-color: var(--hairline-soft); }
  .cal-day.selected {
    border-color: var(--teal);
    color: var(--teal);
    background: var(--teal-tint);
    font-weight: 600;
  }
  .cal-legend {
    display: flex; flex-wrap: wrap; gap: 8px 12px;
    padding-top: 14px; margin-top: 8px;
    border-top: 1px solid var(--hairline-soft);
    font-size: 10px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .cal-legend .item { display: inline-flex; align-items: center; gap: 5px; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 999px;
    display: inline-block;
    border: 1px solid var(--ink);
  }
  .dot.win       { background: transparent; border-color: var(--teal); }
  .dot.delay     { background: transparent; border-color: var(--ink); border-style: dashed; }
  .dot.delivered { background: var(--teal); border-color: var(--teal); }
  .dot.notrack   { background: transparent; border-color: var(--ink-faint); }

  /* ---------- Bottom chips ---------- */
  .bottom-row { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 14px;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    font-size: 12px;
    color: var(--ink);
    background: var(--frost);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: border-color .14s, color .14s;
  }
  .chip:hover { border-color: var(--teal); color: var(--teal); }
  .chip.dashed { border-style: dashed; color: var(--ink-soft); }

  /* ---------- Loading screen ---------- */
  /* Animated brain logo, sized small in the center, tinted to match the
     kaleidoscope strokes so it reads as part of the pattern. */
  #loader {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
    background: transparent;
    animation: loaderOut 0.7s ease 2.3s forwards;
  }
  .loader-svg {
    width: clamp(220px, 22vw, 320px);
    height: auto;
    display: block;
    color: rgba(40, 50, 65, 0.22);
  }
  @keyframes loaderOut {
    0%   { opacity: 1; visibility: visible; }
    100% { opacity: 0; visibility: hidden;  }
  }

  /* ---------- Page entry animations (slow, ~1.1s each) ---------- */
  /* Opacity ramps to full inside the first ~15% so the slide reads as a fully
     opaque element moving into place — preserves the page's static frost
     transparency rather than dragging it through a long fade-in. */
  /* slideDown uses `top` instead of transform so it does NOT create a
     compositing layer — keeps backdrop-filter intact on .topbar-search,
     .nav-copilot, and .nav-bell which sit inside the animating bars. */
  @keyframes slideDown  {
    0%   { top: -180px; }
    100% { top: 0; }
  }
  @keyframes slideUp {
    0%   { transform: translateY(60px); opacity: 0; }
    15%  { opacity: 1; }
    100% { transform: none; opacity: 1; }
  }
  @keyframes slideLeft {
    0%   { transform: translateX(-50px); opacity: 0; }
    15%  { opacity: 1; }
    100% { transform: none; opacity: 1; }
  }
  @keyframes slideRight {
    0%   { transform: translateX(50px); opacity: 0; }
    15%  { opacity: 1; }
    100% { transform: none; opacity: 1; }
  }

  /* Animate INDIVIDUAL frost children, never their wrappers — a wrapper
     animation creates a compositing layer that flattens backdrop-filter on
     children, making cards look transparent instead of frosted. */
  .topbar         { animation: slideDown  1.1s cubic-bezier(.22,.9,.3,1) 2.30s both; }
  .nav            { animation: slideDown  1.1s cubic-bezier(.22,.9,.3,1) 2.42s both; }
  .welcome-row h1 { animation: slideLeft  1.1s cubic-bezier(.22,.9,.3,1) 2.62s both; }

  .welcome-actions > .btn:nth-child(1) { animation: slideRight 1.1s cubic-bezier(.22,.9,.3,1) 2.62s both; }
  .welcome-actions > .btn:nth-child(2) { animation: slideRight 1.1s cubic-bezier(.22,.9,.3,1) 2.70s both; }
  .welcome-actions > .btn:nth-child(3) { animation: slideRight 1.1s cubic-bezier(.22,.9,.3,1) 2.78s both; }

  .stats > .stat:nth-child(1) { animation: slideLeft 1.1s cubic-bezier(.22,.9,.3,1) 2.86s both; }
  .stats > .stat:nth-child(2) { animation: slideLeft 1.1s cubic-bezier(.22,.9,.3,1) 2.92s both; }
  .stats > .stat:nth-child(3) { animation: slideLeft 1.1s cubic-bezier(.22,.9,.3,1) 2.98s both; }
  .stats > .stat:nth-child(4) { animation: slideLeft 1.1s cubic-bezier(.22,.9,.3,1) 3.04s both; }
  .stats > .stat:nth-child(5) { animation: slideLeft 1.1s cubic-bezier(.22,.9,.3,1) 3.10s both; }

  .col-left  > .card:nth-child(1) { animation: slideLeft  1.1s cubic-bezier(.22,.9,.3,1) 3.18s both; }
  .col-left  > .card:nth-child(2) { animation: slideLeft  1.1s cubic-bezier(.22,.9,.3,1) 3.30s both; }
  .col-right > .card:nth-child(1) { animation: slideRight 1.1s cubic-bezier(.22,.9,.3,1) 3.18s both; }
  .col-right > .card:nth-child(2) { animation: slideRight 1.1s cubic-bezier(.22,.9,.3,1) 3.30s both; }

  .bottom-row > .chip:nth-child(1) { animation: slideUp 1.1s cubic-bezier(.22,.9,.3,1) 3.42s both; }
  .bottom-row > .chip:nth-child(2) { animation: slideUp 1.1s cubic-bezier(.22,.9,.3,1) 3.48s both; }
  .bottom-row > .chip:nth-child(3) { animation: slideUp 1.1s cubic-bezier(.22,.9,.3,1) 3.54s both; }

  @media (prefers-reduced-motion: reduce) {
    #loader { animation: loaderOut 0.3s ease 0.2s forwards; }
    .loader-svg * { animation: none !important; }
    .topbar, .nav, .welcome-row h1,

<script>
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let w = 0, h = 0;

  // Dimmer than before — barely-there strokes
  const stroke      = 'rgba(40, 50, 65, 0.13)';
  const strokeMid   = 'rgba(13, 79, 94, 0.16)';
  const strokeBold  = 'rgba(40, 50, 65, 0.18)';

  function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width  = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize, { passive: true });
  resize();

  // Single kaleidoscopic organism:
  //   - 24 radial spokes anchor the symmetry
  //   - concentric morphing rings breathe in/out, each with multiple harmonics
  //   - diamond lattice between rings creates the cross-cutting kaleidoscope shapes
  // Everything shares the same time variable so the whole field moves as one.
  let start = performance.now();
  function frame(now) {
    const t = (now - start) / 1000;
    ctx.clearRect(0, 0, w, h);

    const cx = w / 2;
    const cy = h / 2;
    const maxR = Math.hypot(w, h) * 0.62;
    const sectors = 24;          // kaleidoscope fold count
    const baseStep = 64;         // ring spacing
    const ringCount = Math.ceil(maxR / baseStep) + 1;
    const slowSpin = t * 0.018;  // very slow rotation of the whole organism

    ctx.lineWidth = 1;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Radial spokes — establish the kaleidoscope symmetry
    ctx.strokeStyle = stroke;
    for (let s = 0; s < sectors; s++) {
      const a = (s / sectors) * Math.PI * 2 + slowSpin;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * baseStep * 0.4, cy + Math.sin(a) * baseStep * 0.4);
      ctx.lineTo(cx + Math.cos(a) * maxR, cy + Math.sin(a) * maxR);
      ctx.stroke();
    }

    // Concentric breathing rings — the organism
    for (let k = 1; k <= ringCount; k++) {
      const baseR = k * baseStep;
      ctx.strokeStyle = (k % 5 === 0) ? strokeMid : stroke;
      ctx.beginPath();
      const segs = sectors * 8;
      for (let i = 0; i <= segs; i++) {
        const a = (i / segs) * Math.PI * 2 + slowSpin;
        // Layered harmonics keep the silhouette flowing without ever repeating exactly
        const w1 = Math.sin(a * sectors / 2 + t * 0.42 + k * 0.31) * 9;
        const w2 = Math.cos(a * sectors / 4 - t * 0.55 + k * 0.47) * 5;
        const w3 = Math.sin(a * sectors / 8 + t * 0.22 - k * 0.18) * 7;
        const breath = Math.sin(t * 0.18 + k * 0.22) * 4;
        const r = baseR + w1 + w2 + w3 + breath;
        const x = cx + Math.cos(a) * r;
        const y = cy + Math.sin(a) * r;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
    }

    // Diamond lattice — connects ring N to ring N+1 with crossing chords
    ctx.strokeStyle = stroke;
    for (let k = 1; k < ringCount; k++) {
      const r1 = k * baseStep;
      const r2 = (k + 1) * baseStep;
      if (r2 > maxR) continue;
      const offset = (k % 2 === 0) ? 0 : Math.PI / sectors;
      const wobble = Math.sin(t * 0.3 + k) * 0.03;
      ctx.beginPath();
      for (let s = 0; s < sectors; s++) {
        const a1 = (s / sectors) * Math.PI * 2 + offset + slowSpin + wobble;
        const a2 = ((s + 0.5) / sectors) * Math.PI * 2 + offset + slowSpin - wobble;
        const a3 = ((s - 0.5) / sectors) * Math.PI * 2 + offset + slowSpin - wobble;
        const x1 = cx + Math.cos(a1) * r1;
        const y1 = cy + Math.sin(a1) * r1;
        const x2 = cx + Math.cos(a2) * r2;
        const y2 = cy + Math.sin(a2) * r2;
        const x3 = cx + Math.cos(a3) * r2;
        const y3 = cy + Math.sin(a3) * r2;
        ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.moveTo(x1, y1); ctx.lineTo(x3, y3);
      }
      ctx.stroke();
    }

    // A single soft accent ring that wanders through the organism — adds depth
    const accentK = 4 + Math.sin(t * 0.08) * 2.5;
    const accentR = accentK * baseStep;
    ctx.strokeStyle = strokeBold;
    ctx.beginPath();
    const aSegs = sectors * 8;
    for (let i = 0; i <= aSegs; i++) {
      const a = (i / aSegs) * Math.PI * 2 + slowSpin;
      const wob = Math.sin(a * sectors / 2 + t * 0.6) * 11
                + Math.cos(a * sectors / 3 - t * 0.4) * 6;
      const r = accentR + wob;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>

/* ---------- Calendar ---------- */
function CalendarCard() {
  // April 2026 — Wed start, 30 days
  const offset = 3, days = 30, today = 28;
  const [selected, setSelected] = useState(today);
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push({ blank: true, key: `b${i}` });
  for (let d = 1; d <= days; d++) cells.push({ day: d, key: `d${d}` });
  while (cells.length % 7 !== 0) cells.push({ blank: true, key: `e${cells.length}` });

  return (
    <div className="card">
      <div className="card-title" style={{ marginBottom: 6 }}>
        <span className="ic"><Truck /></span>
        Shipping &amp; Deliveries
      </div>
      <div className="cal-head">
        <span className="cal-nav" onClick={noop}><ChevL /></span>
        <span className="cal-month">April 2026</span>
        <span className="cal-nav" onClick={noop}><ChevR /></span>
      </div>
      <div className="cal-grid">
        {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d =>
          <div key={d} className="cal-dow">{d}</div>)}
        {cells.map(c => {
          if (c.blank) return <div key={c.key} className="cal-day muted" />;
          const isSelected = c.day === selected;
          return (
            <div key={c.key}
                 className={`cal-day${isSelected ? " selected" : ""}`}
                 onClick={() => setSelected(s => s === c.day ? null : c.day)}>
              {c.day}
            </div>
          );
        })}
      </div>
      <div className="cal-legend">
        <span className="item"><TruckTiny /> Ships</span>
        <span className="item"><span className="dot win"/> Delivery Window</span>
        <span className="item"><span className="dot delay"/> Delayed</span>
        <span className="item"><span className="dot delivered"/> Delivered</span>
        <span className="item"><span className="dot notrack"/> No Tracking</span>
        <span className="item"><BellTiny /> Subsc…</span>
      </div>
    </div>
  );
}
